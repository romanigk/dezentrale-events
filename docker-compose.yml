version: '3'
services:
  db:
    image: postgres:14-alpine3.18
    volumes:
      - postgres:/var/lib/postgresql/data
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 5s
      retries: 10
    extends:
      file: postgres.yaml
      service: postgres
volumes:
  postgres: